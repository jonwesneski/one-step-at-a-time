<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flag Bézier Editor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: monospace;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      #canvas-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 20px;
      }

      svg#editor {
        background: #2d2d2d;
        border: 1px solid #444;
        cursor: default;
      }

      /* Path styles */
      .stem {
        stroke: #888;
        stroke-width: 2;
        fill: none;
      }
      .flag-shape {
        fill: #c8a96e;
        stroke: none;
        opacity: 0.9;
      }
      .control-line {
        stroke: #555;
        stroke-width: 1;
        stroke-dasharray: 4 3;
        fill: none;
      }

      /* Handles */
      .handle {
        cursor: grab;
      }
      .handle:active {
        cursor: grabbing;
      }
      .handle-anchor {
        fill: #4fc3f7;
        stroke: #1a6a90;
        stroke-width: 1.5;
        r: 7;
      }
      .handle-ctrl {
        fill: #ef9a9a;
        stroke: #8b3030;
        stroke-width: 1.5;
        r: 6;
      }

      /* Labels */
      .label {
        font-size: 11px;
        fill: #888;
        pointer-events: none;
        user-select: none;
      }

      #side-panel {
        width: 340px;
        background: #252526;
        border-left: 1px solid #3c3c3c;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #side-panel h2 {
        padding: 12px 16px;
        font-size: 13px;
        color: #9cdcfe;
        border-bottom: 1px solid #3c3c3c;
      }

      #code-output {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }
      pre {
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-all;
        color: #ce9178;
      }

      #copy-btn {
        margin: 12px 16px;
        padding: 8px 12px;
        background: #0e639c;
        color: #fff;
        border: none;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
        border-radius: 3px;
      }
      #copy-btn:hover {
        background: #1177bb;
      }
      #copy-btn.copied {
        background: #388a34;
      }

      #offsets {
        padding: 12px 16px;
        border-top: 1px solid #3c3c3c;
        font-size: 11px;
        color: #6a9955;
      }
      #offsets table {
        border-collapse: collapse;
        width: 100%;
      }
      #offsets td {
        padding: 2px 6px;
      }
      #offsets td:first-child {
        color: #9cdcfe;
        width: 80px;
      }
      #offsets td:last-child {
        color: #b5cea8;
      }

      #zoom-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }
      #zoom-controls button {
        background: #3c3c3c;
        border: 1px solid #555;
        color: #d4d4d4;
        padding: 3px 10px;
        cursor: pointer;
        border-radius: 3px;
        font-size: 12px;
      }
      #zoom-controls button:hover {
        background: #505050;
      }
      #zoom-label {
        min-width: 50px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="canvas-panel">
      <div id="zoom-controls">
        <button onclick="setZoom(zoom - 0.1)">−</button>
        <span id="zoom-label">100%</span>
        <button onclick="setZoom(zoom + 0.1)">+</button>
        <button onclick="setZoom(1)">Reset</button>
        <span style="color: #666; font-size: 11px; margin-left: 8px"
          >Coord space: 600 units (pre-scale)</span
        >
      </div>
      <svg id="editor" width="700" height="800"></svg>
    </div>

    <div id="side-panel">
      <h2>Path &lt;d&gt; attribute — copy into note.ts</h2>
      <div id="code-output"><pre id="code-pre"></pre></div>
      <button id="copy-btn" onclick="copyCode()">Copy to clipboard</button>
      <div id="offsets">
        <div style="margin-bottom: 6px; color: #9cdcfe; font-size: 11px">
          Point offsets from xFlagStart / yFlagStart
        </div>
        <table id="offset-table"></table>
      </div>
    </div>

    <script>
      // ── Constants matching note.ts ────────────────────────────────────────────────
      const NOTE_Y_STEM_START = 100;
      const HEAD_WIDTH = 80;
      const STEM_WIDTH = 22;
      const xStart = 0; // assume xStart=0 for the editor

      const xFlagStart = xStart + HEAD_WIDTH - 15; // 65
      const yFlagTop = NOTE_Y_STEM_START; // 100
      const yFlagStart = yFlagTop + 100; // 200

      // ── Initial control points (absolute coords, 600-unit space) ─────────────────
      // Path: M anchor0  Q cp1 anchor1  C cp2 cp3 anchor2  Z
      //
      // M  xFlagStart, yFlagStart
      // Q  xFlagStart+160, yFlagStart+40   xFlagStart+140, yFlagStart+260
      // C  xFlagStart+180, yFlagStart-40   xFlagStart, yFlagTop+90   xFlagStart, yFlagTop
      // Z

      const pts = {
        anchor0: {
          x: xFlagStart,
          y: yFlagStart,
          label: 'M (start)',
          cls: 'handle-anchor',
        },
        qcp1: {
          x: xFlagStart + 160,
          y: yFlagStart + 40,
          label: 'Q cp',
          cls: 'handle-ctrl',
        },
        anchor1: {
          x: xFlagStart + 140,
          y: yFlagStart + 260,
          label: 'Q end',
          cls: 'handle-anchor',
        },
        ccp1: {
          x: xFlagStart + 180,
          y: yFlagStart - 40,
          label: 'C cp1',
          cls: 'handle-ctrl',
        },
        ccp2: {
          x: xFlagStart,
          y: yFlagTop + 90,
          label: 'C cp2',
          cls: 'handle-ctrl',
        },
        anchor2: {
          x: xFlagStart,
          y: yFlagTop,
          label: 'C end (top)',
          cls: 'handle-anchor',
        },
      };

      // ── SVG canvas ────────────────────────────────────────────────────────────────
      const svg = document.getElementById('editor');
      const SVG_NS = 'http://www.w3.org/2000/svg';

      // Viewport margin so points near edge are still visible
      const MARGIN = 40;
      let zoom = 1.0;

      function svgW() {
        return parseInt(svg.getAttribute('width'));
      }
      function svgH() {
        return parseInt(svg.getAttribute('height'));
      }

      // Coordinate space bounds (600-unit space)
      const COORD_W = 600;
      const COORD_H = 900; // enough room

      function toScreen(cx, cy) {
        const sx = MARGIN + (cx / COORD_W) * (svgW() - 2 * MARGIN) * zoom;
        const sy = MARGIN + (cy / COORD_H) * (svgH() - 2 * MARGIN) * zoom;
        return [sx, sy];
      }

      function fromScreen(sx, sy) {
        const cx = ((sx - MARGIN) / ((svgW() - 2 * MARGIN) * zoom)) * COORD_W;
        const cy = ((sy - MARGIN) / ((svgH() - 2 * MARGIN) * zoom)) * COORD_H;
        return [Math.round(cx), Math.round(cy)];
      }

      function setZoom(z) {
        zoom = Math.max(0.3, Math.min(3, z));
        document.getElementById('zoom-label').textContent =
          Math.round(zoom * 100) + '%';
        render();
      }

      // ── Build SVG elements ────────────────────────────────────────────────────────
      let elements = {};

      function makeLine(id) {
        const el = document.createElementNS(SVG_NS, 'line');
        el.classList.add('control-line');
        el.id = id;
        svg.appendChild(el);
        elements[id] = el;
        return el;
      }

      function makeCircle(key, p) {
        const el = document.createElementNS(SVG_NS, 'circle');
        el.classList.add('handle', p.cls);
        el.id = 'h_' + key;
        el.setAttribute('r', p.cls === 'handle-anchor' ? '7' : '6');
        svg.appendChild(el);
        elements['h_' + key] = el;

        const lbl = document.createElementNS(SVG_NS, 'text');
        lbl.classList.add('label');
        lbl.id = 'lbl_' + key;
        lbl.textContent = p.label;
        svg.appendChild(lbl);
        elements['lbl_' + key] = lbl;

        makeDraggable(el, key);
        return el;
      }

      // Stem reference line (visual guide)
      const stemLine = document.createElementNS(SVG_NS, 'line');
      stemLine.classList.add('stem');
      stemLine.id = 'stem-ref';
      svg.appendChild(stemLine);

      // Flag path
      const flagPath = document.createElementNS(SVG_NS, 'path');
      flagPath.classList.add('flag-shape');
      flagPath.id = 'flag-path';
      svg.appendChild(flagPath);

      // Control lines
      makeLine('line_q');
      makeLine('line_c1');
      makeLine('line_c2');
      makeLine('line_c3');

      // Handles (order matters — drawn on top of lines)
      Object.keys(pts).forEach((k) => makeCircle(k, pts[k]));

      // ── Render ────────────────────────────────────────────────────────────────────
      function render() {
        const p = pts;

        // Update flag path
        const d = buildPath();
        flagPath.setAttribute('d', screenPath());

        // Stem reference
        const [sx0, sy0] = toScreen(xFlagStart, yFlagTop - 500);
        const [sx1, sy1] = toScreen(xFlagStart, yFlagTop + 400);
        stemLine.setAttribute('x1', sx0);
        stemLine.setAttribute('y1', sy0);
        stemLine.setAttribute('x2', sx1);
        stemLine.setAttribute('y2', sy1);

        // Control lines: anchor0→qcp1, qcp1→anchor1, anchor1→ccp1, ccp2→anchor2
        setLine('line_q', 'anchor0', 'qcp1');
        setLine('line_c1', 'anchor1', 'ccp1');
        setLine('line_c2', 'ccp1', 'ccp2');
        setLine('line_c3', 'ccp2', 'anchor2');

        // Handles & labels
        Object.keys(pts).forEach((k) => {
          const [sx, sy] = toScreen(pts[k].x, pts[k].y);
          elements['h_' + k].setAttribute('cx', sx);
          elements['h_' + k].setAttribute('cy', sy);
          elements['lbl_' + k].setAttribute('x', sx + 9);
          elements['lbl_' + k].setAttribute('y', sy + 4);
        });

        // Code output
        updateCode();
      }

      function setLine(id, keyA, keyB) {
        const [ax, ay] = toScreen(pts[keyA].x, pts[keyA].y);
        const [bx, by] = toScreen(pts[keyB].x, pts[keyB].y);
        elements[id].setAttribute('x1', ax);
        elements[id].setAttribute('y1', ay);
        elements[id].setAttribute('x2', bx);
        elements[id].setAttribute('y2', by);
      }

      function screenPath() {
        // Build path directly in screen coords
        function s(k) {
          return toScreen(pts[k].x, pts[k].y);
        }
        const [m0x, m0y] = s('anchor0');
        const [q1x, q1y] = s('qcp1');
        const [a1x, a1y] = s('anchor1');
        const [c1x, c1y] = s('ccp1');
        const [c2x, c2y] = s('ccp2');
        const [a2x, a2y] = s('anchor2');
        return `M${m0x},${m0y} Q${q1x},${q1y} ${a1x},${a1y} C${c1x},${c1y} ${c2x},${c2y} ${a2x},${a2y} Z`;
      }

      // ── Code output ───────────────────────────────────────────────────────────────
      function buildPath() {
        const p = pts;
        return `M\${xFlagStart},\${yFlagStart}
       Q\${xFlagStart + ${p.qcp1.x - xFlagStart}},\${yFlagStart + ${
          p.qcp1.y - yFlagStart
        }}
         \${xFlagStart + ${p.anchor1.x - xFlagStart}},\${yFlagStart + ${
          p.anchor1.y - yFlagStart
        }}
       C\${xFlagStart + ${p.ccp1.x - xFlagStart}},\${yFlagStart + ${
          p.ccp1.y - yFlagStart
        }}
         \${xFlagStart + ${p.ccp2.x - xFlagStart}},\${yFlagTop + ${
          p.ccp2.y - yFlagTop
        }}
         \${xFlagStart},\${yFlagTop}
        Z`;
      }

      function updateCode() {
        const p = pts;
        const code = `singleFlag.setAttribute(
  'd',
  \`M\${xFlagStart},\${yFlagStart}
   Q\${xFlagStart + ${p.qcp1.x - xFlagStart}},\${yFlagStart + ${
          p.qcp1.y - yFlagStart
        }}
     \${xFlagStart + ${p.anchor1.x - xFlagStart}},\${yFlagStart + ${
          p.anchor1.y - yFlagStart
        }}
   C\${xFlagStart + ${p.ccp1.x - xFlagStart}},\${yFlagStart + ${
          p.ccp1.y - yFlagStart
        }}
     \${xFlagStart + ${p.ccp2.x - xFlagStart}},\${yFlagTop + ${
          p.ccp2.y - yFlagTop
        }}
     \${xFlagStart},\${yFlagTop}
    Z\`
);`;
        document.getElementById('code-pre').textContent = code;

        // Offset table
        const rows = [
          ['M', `xFlagStart`, `yFlagStart`],
          ['Q cp', `+${p.qcp1.x - xFlagStart}`, `+${p.qcp1.y - yFlagStart}`],
          [
            'Q end',
            `+${p.anchor1.x - xFlagStart}`,
            `+${p.anchor1.y - yFlagStart}`,
          ],
          ['C cp1', `+${p.ccp1.x - xFlagStart}`, `+${p.ccp1.y - yFlagStart}`],
          [
            'C cp2',
            `+${p.ccp2.x - xFlagStart}`,
            `yFlagTop+${p.ccp2.y - yFlagTop}`,
          ],
          ['C end', `xFlagStart`, `yFlagTop`],
        ];
        document.getElementById('offset-table').innerHTML = rows
          .map(
            ([n, x, y]) => `<tr><td>${n}</td><td>${x}</td><td>${y}</td></tr>`
          )
          .join('');
      }

      function copyCode() {
        const code = document.getElementById('code-pre').textContent;
        navigator.clipboard.writeText(code).then(() => {
          const btn = document.getElementById('copy-btn');
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy to clipboard';
            btn.classList.remove('copied');
          }, 1500);
        });
      }

      // ── Drag logic ────────────────────────────────────────────────────────────────
      let dragging = null;
      let dragOffX = 0,
        dragOffY = 0;

      function makeDraggable(el, key) {
        el.addEventListener('mousedown', (e) => {
          e.preventDefault();
          dragging = key;
          const rect = svg.getBoundingClientRect();
          const [cx, cy] = fromScreen(
            e.clientX - rect.left,
            e.clientY - rect.top
          );
          dragOffX = pts[key].x - cx;
          dragOffY = pts[key].y - cy;
        });
      }

      svg.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const rect = svg.getBoundingClientRect();
        const [cx, cy] = fromScreen(
          e.clientX - rect.left,
          e.clientY - rect.top
        );

        // anchor0 is fixed (it's M xFlagStart, yFlagStart — baseline)
        if (dragging === 'anchor0' || dragging === 'anchor2') return;

        pts[dragging].x = cx + dragOffX;
        pts[dragging].y = cy + dragOffY;
        render();
      });

      svg.addEventListener('mouseup', () => {
        dragging = null;
      });
      svg.addEventListener('mouseleave', () => {
        dragging = null;
      });

      // ── Init ──────────────────────────────────────────────────────────────────────
      render();
    </script>
  </body>
</html>
