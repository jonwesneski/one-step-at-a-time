<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Music Composition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: sans-serif;
      }

      main {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background: #fafafa;
      }

      #music-composition {
        display: flex;
        flex-wrap: wrap;
        width: 100%;
        max-width: 900px;
        border: 1px solid red;
      }

      .music-measure {
        flex: 1 1 100px;
        border: 1px solid blue;
        box-sizing: border-box;
      }

      .music-measure span {
        display: block;
      }

      .music-staff-treble svg {
        width: 100%;
        height: 100px;
        display: block;
        background: #eee;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="music-composition">
        <!-- Measure 1 -->
        <div class="music-measure">
          <span>item</span>
          <div class="music-staff-treble">
            <svg viewBox="0 0 200 100" preserveAspectRatio="none">
              <line x1="0" y1="0" x2="0" y2="100" stroke="black" />
              <line x1="0" y1="50" x2="200" y2="50" stroke="black" />
              <line x1="200" y1="0" x2="200" y2="100" stroke="black" />
            </svg>
          </div>
          <span>item</span>
          <div class="music-staff-treble">
            <svg viewBox="0 0 200 100" preserveAspectRatio="none">
              <line x1="0" y1="0" x2="0" y2="100" stroke="black" />
              <line x1="0" y1="50" x2="200" y2="50" stroke="black" />
              <line x1="200" y1="0" x2="200" y2="100" stroke="black" />
            </svg>
          </div>
        </div>

        <!-- Measure 2 -->
        <div class="music-measure">
          <span>item</span>
          <div class="music-staff-treble">
            <svg viewBox="0 0 200 100" preserveAspectRatio="none">
              <line x1="0" y1="0" x2="0" y2="100" stroke="black" />
              <line x1="0" y1="50" x2="200" y2="50" stroke="black" />
              <line x1="200" y1="0" x2="200" y2="100" stroke="black" />
            </svg>
          </div>
          <span>item</span>
          <div class="music-staff-treble">
            <svg viewBox="0 0 200 100" preserveAspectRatio="none">
              <line x1="0" y1="0" x2="0" y2="100" stroke="black" />
              <line x1="0" y1="50" x2="200" y2="50" stroke="black" />
              <line x1="200" y1="0" x2="200" y2="100" stroke="black" />
            </svg>
          </div>
        </div>

        <!-- Measure 3 -->
        <div class="music-measure">
          <span>item</span>
          <div class="music-staff-treble">
            <svg viewBox="0 0 200 100" preserveAspectRatio="none">
              <line x1="0" y1="0" x2="0" y2="100" stroke="black" />
              <line x1="0" y1="50" x2="200" y2="50" stroke="black" />
              <line x1="200" y1="0" x2="200" y2="100" stroke="black" />
            </svg>
          </div>
          <span>item</span>
          <div class="music-staff-treble">
            <svg viewBox="0 0 200 100" preserveAspectRatio="none">
              <line x1="0" y1="0" x2="0" y2="100" stroke="black" />
              <line x1="0" y1="50" x2="200" y2="50" stroke="black" />
              <line x1="200" y1="0" x2="200" y2="100" stroke="black" />
            </svg>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
